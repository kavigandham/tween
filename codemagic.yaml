workflows:
  ios-testflight:
    name: Tween iOS – TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true

    # Reference an App Store Connect API key you add ONCE in the Codemagic UI:
    #   Codemagic → Teams → Integrations → Developer Portal / App Store Connect
    #   → Connect, then create a key named EXACTLY "Tween ASC Key" with:
    #     Issuer ID  = <your issuer id>
    #     Key ID     = JXLP2Q6WL7
    #     API key    = paste the contents of AuthKey_JXLP2Q6WL7.p8
    integrations:
      app_store_connect: Tween ASC Key

    environment:
      # Code signing identities (Distribution cert + provisioning profiles)
      # are managed via the Codemagic UI "Code signing identities" tab and
      # auto-injected. No CERTIFICATE_PRIVATE_KEY env var required.
      xcode: "26.0"
      vars:
        APP_BUNDLE_ID: "com.kavigandham.TweenApp"
        EXT_BUNDLE_ID: "com.kavigandham.TweenApp.messages"
        XCODE_PROJECT: "TweenApp.xcodeproj"
        XCODE_SCHEME: "TweenApp"

    scripts:
      - name: Install XcodeGen and generate the project
        script: |
          brew install xcodegen
          xcodegen generate

      - name: Set the build number (monotonic via Codemagic counter)
        script: |
          # 1.0.1 is a fresh version train, so build numbers restart cleanly;
          # $BUILD_NUMBER guarantees each upload is higher than the last.
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" TweenApp/Info.plist

      - name: Set up code signing (uses cert + profiles uploaded via Codemagic UI)
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Inspect fetched provisioning profiles (diagnostic)
        script: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "Profiles directory contents:"
          ls -la "$PP_DIR" || echo "  (no profiles directory!)"
          for p in "$PP_DIR"/*.mobileprovision; do
            [ -e "$p" ] || { echo "NO PROFILES FOUND — fetch-signing-files produced nothing"; break; }
            echo "================================================================"
            security cms -D -i "$p" > /tmp/pp.plist 2>/dev/null
            echo "Name:      $(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/pp.plist 2>/dev/null)"
            echo "App ID:    $(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /tmp/pp.plist 2>/dev/null)"
            echo "App Groups in this profile:"
            /usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.security.application-groups' /tmp/pp.plist 2>/dev/null \
              || echo "  >>> NONE — this profile has NO App Groups entitlement (root cause) <<<"
          done

      - name: Build the IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # Uploads to TestFlight; does NOT submit for App Store review.
        submit_to_testflight: true
